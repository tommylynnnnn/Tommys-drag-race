<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Drag Race Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Drag Race Simulator</h1>

<div class="top-bar">
    <input id="search" type="text" placeholder="Search for a queen...">
    <button id="start-btn">Start Simulator</button>
</div>

<div class="random-select-container">
    <label for="random-count" class="random-label">Random Cast</label>

    <div class="random-row">
        <input 
            type="number" 
            id="random-count" 
            min="1" 
            max="16" 
            placeholder="Number of queens"
            class="random-input"
        >

        <button id="random-select-btn" class="random-btn">
            🎲 Randomize
        </button>
    </div>
</div>

    
<p id="queen-count"></p>
<div id="queen-grid"></div>

<div id="season-options-overlay" class="hidden">
    <div id="season-options-box">
        <h2>Season Options</h2>

        <label>Premiere Type</label>
        <select id="premiere-type">
            <option value="normal">Normal Premiere</option>
            <option value="split">Split Premiere (S6/S12/S14)</option>
            <option value="double">Double Premiere</option>
            <option value="none">No Elimination Premiere</option>
        </select>

        <label>Finale Type</label>
        <select id="finale-type">
            <option value="lipsync">Lip Sync for the Crown</option>
            <option value="smackdown">Lip Sync Smackdown</option>
            <option value="top3">Top 3 Finale</option>
            <option value="jury">Jury Vote Finale</option>
        </select>

        <button id="season-options-continue">Continue</button>
    </div>
</div>
  
<div id="episode-overlay" class="hidden">
  <div class="episode-panel">
    <div id="episode-content"></div>

    <div id="episode-queens"></div> <!-- CIRCLE IMAGES GO HERE -->

    <button id="episode-continue-btn">Continue →</button>
  </div>
</div>
    
<script src="script.js"></script>
</body>
</html>
