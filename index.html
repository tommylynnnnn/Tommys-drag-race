<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Drag Race Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Drag Race Simulator</h1>

<!-- ⭐ FIXED FLEX ROW ⭐ -->
<div id="top-row">

    <!-- Left: Season Options -->
    <div id="season-options-box">
        <h3>Season Options</h3>

        <label>Premiere Type:</label>
       <select id="premiere-type">
    <option value="normal">Normal Premiere</option>
    <option value="double">Split Premiere</option>
</select>

        <label>Finale Type:</label>
        <select id="finale-type">
    <option value="top3">Top 3</option>
    <option value="top4cut2">Top 4</option>
    <option value="smackdown">Lipsync Smackdown</option>
</select>
        
    </div>

    <!-- Right: Search + Start -->
    <div id="title-search-wrapper">
        <div class="top-bar">
    <input id="search" type="text" placeholder="Search for a queen...">

    <!-- ⭐ ADD THIS HERE ⭐ -->
    <select id="season-filter">
        <option value="all">All Seasons</option>
        <option value="Season 1">Season 1</option>
        <option value="Season 2">Season 2</option>
        <option value="Season 3">Season 3</option>
        <option value="Season 4">Season 4</option>
        <option value="Season 5">Season 5</option>
        <option value="Season 6">Season 6</option>
        <option value="Season 7">Season 7</option>
        <option value="Season 8">Season 8</option>
        <option value="Season 9">Season 9</option>
        <option value="Season 10">Season 10</option>
        <option value="Season 11">Season 11</option>
        <option value="Season 12">Season 12</option>
        <option value="Season 13">Season 13</option>
        <option value="Season 14">Season 14</option>
        <option value="Season 15">Season 15</option>
        <option value="Season 16">Season 16</option>
        <option value="Season 17">Season 17</option>
        <option value="Season 18">Season 18</option>

        <option value="All Stars 1">All Stars 1</option>
        <option value="All Stars 2">All Stars 2</option>
        <option value="All Stars 3">All Stars 3</option>
        <option value="All Stars 4">All Stars 4</option>
        <option value="All Stars 5">All Stars 5</option>
        <option value="All Stars 6">All Stars 6</option>
        <option value="All Stars 7">All Stars 7</option>
        <option value="All Stars 8">All Stars 8</option>
        <option value="All Stars 9">All Stars 9</option>
        <option value="All Stars 10">All Stars 10</option>
        <option value="All Stars 11">All Stars 11</option>

        <option value="Global All Stars">Global All Stars</option>
    </select>
    <!-- ⭐ END OF INSERT ⭐ -->

    <button id="start-btn">Start Simulator</button>
</div>
    </div>

</div>

<!-- END OF FLEX ROW -->


<div class="random-select-container">
    <label for="random-count" class="random-label">Random Cast</label>

    <div class="random-row">
        <input 
            type="number" 
            id="random-count" 
            min="1" 
            max="16" 
            placeholder="Number of queens"
            class="random-input"
        >

        <button id="random-select-btn" class="random-btn">
            🎲 Randomize
        </button>
    </div>
</div>

<p id="queen-count"></p>

<div id="queen-grid"></div>

<div id="episode-overlay" class="hidden">
  <div class="episode-panel">
    <div id="episode-content"></div>

    <div id="episode-queens"></div>

    <button id="episode-continue-btn">Continue →</button>
  </div>
</div>
    
<script src="script.js"></script>
</body>
</html>
