<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Drag Race Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Drag Race Simulator</h1>

<!-- ⭐ FIXED FLEX ROW ⭐ -->
<div id="top-row">

    <!-- Left: Season Options -->
    <div id="season-options-box">
        <h3>Season Options</h3>

        <label>Premiere Type:</label>
       <select id="premiere-type">
    <option value="normal">Normal Premiere</option>
    <option value="double">Split Premiere</option>
</select>

        <label>Finale Type:</label>
        <select id="finale-type">
    <option value="top3">Top 3</option>
</select>
        
    </div>

    <!-- Right: Search + Start -->
    <div id="title-search-wrapper">
        <div class="top-bar">
            <input id="search" type="text" placeholder="Search for a queen...">
            <button id="start-btn">Start Simulator</button>
        </div>
    </div>

</div>

<!-- END OF FLEX ROW -->


<div class="random-select-container">
    <label for="random-count" class="random-label">Random Cast</label>

    <div class="random-row">
        <input 
            type="number" 
            id="random-count" 
            min="1" 
            max="16" 
            placeholder="Number of queens"
            class="random-input"
        >

        <button id="random-select-btn" class="random-btn">
            🎲 Randomize
        </button>
    </div>
</div>

<p id="queen-count"></p>

<div id="queen-grid"></div>

<div id="episode-overlay" class="hidden">
  <div class="episode-panel">
    <div id="episode-content"></div>

    <div id="episode-queens"></div>

    <button id="episode-continue-btn">Continue →</button>
  </div>
</div>
    
<script src="script.js"></script>
</body>
</html>
